name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    strategy:
      fail-fast: true

    name: Foundry项目检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 安装Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: 显示Forge版本
        run: |
          forge --version
          cast --version
          anvil --version

      - name: 运行Forge构建
        run: |
          forge --version
          forge build --sizes
        id: build

      - name: 运行Forge测试
        run: |
          forge test -vvv
        id: test

      - name: 生成测试覆盖率报告
        run: |
          forge coverage --report lcov
        id: coverage

      - name: 上传覆盖率到Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./lcov.info
          flags: foundry
          name: foundry-coverage
          fail_ci_if_error: true

  lint:
    name: 代码格式检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: 检查代码格式
        run: forge fmt --check

      - name: 运行Slither静态分析
        uses: crytic/slither-action@v0.3.0
        id: slither
        with:
          target: 'src/'
          slither-config: 'slither.config.json'
          fail-on: none

  security:
    name: 安全检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: 运行Mythril安全扫描
        run: |
          pip3 install mythril
          forge build
          myth analyze out/SimpleNFT.sol/SimpleNFT.json --solc-json remappings.json

  gas-report:
    name: Gas使用报告
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: 生成Gas报告
        run: |
          forge test --gas-report > gas-report.txt

      - name: 上传Gas报告
        uses: actions/upload-artifact@v3
        with:
          name: gas-report
          path: gas-report.txt

  deploy-testnet:
    name: 测试网部署
    runs-on: ubuntu-latest
    needs: [check, lint]
    if: github.ref == 'refs/heads/develop'
    environment: testnet
    steps:
      - uses: actions/checkout@v4

      - name: 安装Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: 部署到Sepolia测试网
        run: |
          forge script script/Deploy.s.sol:DeployScript --rpc-url ${{ secrets.SEPOLIA_RPC_URL }} --private-key ${{ secrets.DEPLOYER_PRIVATE_KEY }} --broadcast --verify --etherscan-api-key ${{ secrets.ETHERSCAN_API_KEY }}
        env:
          NETWORK: sepolia
          DEPLOYER_ADDRESS: ${{ secrets.DEPLOYER_ADDRESS }}
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}

      - name: 保存部署地址
        uses: actions/upload-artifact@v3
        with:
          name: deployment-addresses
          path: deployments/

  deploy-mainnet:
    name: 主网部署
    runs-on: ubuntu-latest
    needs: [check, lint, security]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: 安装Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: 部署到主网
        run: |
          forge script script/Deploy.s.sol:DeployScript --rpc-url ${{ secrets.MAINNET_RPC_URL }} --private-key ${{ secrets.DEPLOYER_PRIVATE_KEY }} --broadcast --verify --etherscan-api-key ${{ secrets.ETHERSCAN_API_KEY }}
        env:
          NETWORK: mainnet
          DEPLOYER_ADDRESS: ${{ secrets.DEPLOYER_ADDRESS }}
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}

  notify:
    name: 通知
    runs-on: ubuntu-latest
    needs: [deploy-testnet, deploy-mainnet]
    if: always()
    steps:
      - name: 发送Slack通知
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}